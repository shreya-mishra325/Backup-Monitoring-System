<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup Monitoring System - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-database"></i>
            </div>
            <h1 class="login-title">Backup Monitoring System</h1>
            <p class="login-subtitle">
                Secure monitoring and backup management platform
            </p>
            <div id="errorBox" class="login-error-box" style="display:none;"></div>
            <form id="loginForm">
                <div class="login-field">
                    <label for="username">Username</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-user login-input-icon"></i>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Enter username"
                            required
                        >
                    </div>
                </div>

                <div class="login-field">
                    <label for="password">Password</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-lock login-input-icon"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter password"
                            required
                        >
                        <button
                            type="button"
                            class="login-password-toggle"
                            id="togglePassword"
                        >
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <button
                    type="submit"
                    class="btn btn-primary login-submit-btn"
                >
                    <i class="fas fa-right-to-bracket"></i>
                    Sign In
                </button>
            </form>
            <div class="login-footer">
                <span>Default Credentials</span>
                <strong>admin / admin123</strong>
            </div>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
