<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup Monitoring System - Backup History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body data-active-tab="backupHistory">
    <div class="topbar" id="topbar"></div>
    <div class="tabs" id="tabs"></div>

    <div class="instance-details-panel" style="margin:24px;">
        <div class="panel-title">
            Instance-wise Backup Summary
        </div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Instance Name</th>
                    <th>Total Backups</th>
                    <th>Successful</th>
                    <th>Failed</th>
                </tr>

            </thead>
            <tbody id="instanceSummaryBody">
                <tr>
                    <td colspan="4" style="text-align:center;">
                        Loading...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="instance-details-panel" style="margin:24px; margin-top:0;">
        <div class="panel-title">
            Recent Backup Activity
        </div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Date &amp; Time</th>
                    <th>Instance</th>
                    <th>Status</th>
                    <th>Remarks</th>
                    <th>Download</th>
                </tr>
            </thead>
            <tbody id="recentActivityBody">
                <tr>
                    <td colspan="5" style="text-align:center;">
                        Loading...
                    </td>
                </tr>
            </tbody>
        </table>
        <div style="margin-top:16px;">
            <button class="btn btn-primary" id="exportCsvBtn">
                <i class="fa-solid fa-download"></i>
                Export CSV
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
