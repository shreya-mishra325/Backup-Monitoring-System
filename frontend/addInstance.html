<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup Monitoring System - Add New Instance</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="topbar" id="topbar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="add-instance-container">
        <h2>Add New Instance</h2>
        <div class="action-result" id="addResult"></div>
        <form id="addInstanceForm">
            <div class="form-group">
                <label for="instanceName">Instance Name</label>
                <input type="text" id="instanceName" name="instanceName" placeholder="e.g. ICARD" required>
            </div>

            <div class="form-group">
                <label for="databaseType">Database Type</label>
                <select id="databaseType" name="databaseType" required>
                    <option value="MySQL/Oracle">MySQL/Oracle</option>
                    <option value="MySQL">MySQL</option>
                    <option value="Oracle">Oracle</option>
                    <option value="PostgreSQL">PostgreSQL</option>
                    <option value="SQL Server">SQL Server</option>
                </select>
            </div>

            <div class="form-group">
                <label for="instanceIp">Instance IP</label>
                <input type="text" id="instanceIp" name="instanceIp" placeholder="e.g. 10.180.18.2" required
                       pattern="^(\d{1,3}\.){3}\d{1,3}$" title="Enter a valid IP address">
            </div>

            <div class="form-group">
                <label for="portNumber">Port Number</label>
                <input type="number" id="portNumber" name="portNumber" placeholder="e.g. 3600" required min="1" max="65535">
            </div>

            <div class="add-instance-actions">
                <button type="button" class="btn btn-secondary" id="checkConnectionBtn">Check Connection</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
            </div>

            <div class="connection-result" id="connectionResult"></div>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script src="js/addInstance.js"></script>
</body>
</html>
