<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup Monitoring System - Add New Instance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="topbar" id="topbar"></div>
    <div class="tabs"   id="tabs"></div>
    <div class="add-instance-container">
        <h2>Add New Instance</h2>
        <div class="action-result" id="addResult"></div>
        <form id="addInstanceForm">
            <div class="add-instance-form-grid">
                <div class="add-instance-col-left">
                    <div class="form-group">
                        <label for="instanceName">Instance Name</label>
                        <input type="text" id="instanceName" name="instanceName"
                               placeholder="e.g. ICARD" required>
                    </div>

                    <div class="form-group">
                        <label for="databaseType">Database Type</label>
                        <select id="databaseType" name="databaseType" required>
                            <option value="MySQL">MySQL</option>
                            <option value="Oracle">Oracle</option>
                            <option value="PostgreSQL">PostgreSQL</option>
                            <option value="SQL Server">SQL Server</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="instanceIp">Instance IP Address</label>
                        <input type="text" id="instanceIp" name="instanceIp"
                               placeholder="e.g. 192.168.1.105" required
                               pattern="^(\d{1,3}\.){3}\d{1,3}$"
                               title="Enter a valid IPv4 address">
                        <div class="field-error" id="instanceIpError"></div>
                    </div>

                    <div class="form-group">
                        <label for="portNumber">Port Number</label>
                        <input type="number" id="portNumber" name="portNumber"
                               placeholder="e.g. 3306" required min="1" max="65535">
                        <div class="field-error" id="portNumberError"></div>
                    </div>
                </div>

                <div class="add-instance-col-right">
                    <div class="form-section-label">Remote Database Credentials</div>
                    <p class="form-section-note">
                        These are the credentials used to log in to the <strong>remote database</strong>
                        when running a backup (mysqldump / expdp). They are stored securely and never
                        shown in the UI after saving.
                    </p>

                    <div class="form-group">
                        <label for="dbUsername">DB Username</label>
                        <input type="text" id="dbUsername" name="dbUsername"
                               placeholder="e.g. root" value="root">
                    </div>

                    <div class="form-group">
                        <label for="dbPassword">DB Password</label>
                        <input type="password" id="dbPassword" name="dbPassword"
                               placeholder="Leave blank if no password">
                    </div>
                </div>

                <div class="add-instance-actions">
                    <button type="button" class="btn btn-secondary" id="checkConnectionBtn">
                        <i class="fa-solid fa-wifi"></i>
                        Check Connection
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fa-solid fa-floppy-disk"></i>
                        Submit
                    </button>
                </div>

                <div class="connection-result" id="connectionResult"></div>
            </div>
        </form>
    </div>
    <script src="js/app.js"></script>
    <script src="js/addInstance.js"></script>
</body>
</html>
