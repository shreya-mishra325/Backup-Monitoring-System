<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup Monitoring System - Backup History</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="topbar" id="topbar"></div>
    <div class="tabs" id="tabs"></div>
    <div class="instance-details-panel" style="margin:24px;">
        <div class="panel-title">
            Backup Reports
        </div>
        <div class="details-grid">
            <div class="detail-row">
                <label>Total Instances</label>
                <div class="detail-value" id="totalInstances">-</div>
            </div>

            <div class="detail-row">
                <label>Total Backups</label>
                <div class="detail-value" id="totalBackups">-</div>
            </div>

            <div class="detail-row">
                <label>Successful Backups</label>
                <div class="detail-value" id="successfulBackups">-</div>
            </div>

            <div class="detail-row">
                <label>Failed Backups</label>
                <div class="detail-value" id="failedBackups">-</div>
            </div>

            <div class="detail-row">
                <label>Success Rate</label>
                <div class="detail-value" id="successRate">-</div>
            </div>

            <div class="detail-row">
                <label>Average Backup Size</label>
                <div class="detail-value" id="averageBackupSize">-</div>
            </div>

        </div>

    </div>

    <div class="charts-row">
        <div class="instance-details-panel chart-panel">
            <div class="panel-title">
                Backup Status Distribution
            </div>
            <div class="chart-container">
                <canvas id="statusPieChart"></canvas>
            </div>
        </div>

        <div class="instance-details-panel chart-panel">
            <div class="panel-title">
                Backups by Instance
            </div>
            <div class="chart-container">
                <canvas id="instanceBarChart"></canvas>
            </div>
        </div>
    </div>

    <div class="instance-details-panel" style="margin:24px; margin-top:0;">
        <div class="panel-title">
            Instance-wise Backup Summary
        </div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Instance Name</th>
                    <th>Total Backups</th>
                    <th>Successful</th>
                    <th>Failed</th>
                </tr>

            </thead>
            <tbody id="instanceSummaryBody">
                <tr>
                    <td colspan="4" style="text-align:center;">
                        Loading...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="instance-details-panel" style="margin:24px; margin-top:0;">
        <div class="panel-title">
            Recent Backup Activity
        </div>
        <table class="report-table">
            <thead>
                <tr>
                    <th>Date &amp; Time</th>
                    <th>Instance</th>
                    <th>Status</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody id="recentActivityBody">
                <tr>
                    <td colspan="4" style="text-align:center;">
                        Loading...
                    </td>
                </tr>
            </tbody>
        </table>
        <div style="margin-top:16px;">
            <button class="btn btn-primary" id="exportCsvBtn">
                Export CSV
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/reports.js"></script>
</body>
</html>
